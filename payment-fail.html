<!DOCTYPE html>
<html lang="bn" data-lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment not completed — Mushroom Wonders</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <section class="card payment-result">
      <div class="lang-toggle" role="group" aria-label="Language">
        <button id="langBn" type="button" aria-pressed="true">বাংলা</button>
        <button id="langEn" type="button" aria-pressed="false">English</button>
      </div>
      <div class="payment-result__icon" aria-hidden="true">⚠️</div>
      <h1 data-i18n="pay_fail_title">পেমেন্ট ব্যর্থ</h1>
      <p id="resultMessage" data-i18n="pay_fail_desc">পেমেন্ট সম্পন্ন হয়নি। আবার চেষ্টা করুন।</p>
      <div class="payment-result__actions">
        <a class="btn btn-primary" href="order.html" data-i18n="pay_back_order">আবার অর্ডার করুন</a>
        <a class="btn btn-outline" href="index.html" data-i18n="pay_back_home">হোমে যান</a>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
  <script src="payment-result.js"></script>
</body>
</html>
